# =============================================================================
# Project AuraOS — Fusion Layer
# Configuração de Exemplo — v0.1 (Fundação)
# =============================================================================
#
# LEIA ANTES DE QUALQUER COISA:
# - SECURITY.md (obrigatório)
# - Este arquivo é o contrato entre tu e o sistema.
# - Tudo que não estiver explicitamente habilitado aqui = NÃO EXISTE.
# - Após editar, reinicie o serviço: systemctl --user restart aura-fusion
# =============================================================================

# -----------------------------------------------------------------------------
# Identidade e Metadados
# -----------------------------------------------------------------------------
identity:
  user_name: "med4to"           # Usado em saudações e diário (pode ser vazio)
  system_name: "aura-fusion"    # Não mude sem motivo forte

# -----------------------------------------------------------------------------
# Segurança e Comportamento Global
# -----------------------------------------------------------------------------
security:
  # Se true (recomendado), o daemon só inicia se a config for 100% válida
  strict_validation: true

  # Se true, TODOS os eventos vão para o audit log (mesmo que sensores estejam off)
  audit_all_events: true

  # Quantos dias de eventos quentes ficam no SQLite (o resto vive no JSONL imutável)
  max_hot_events_days: 30

  # Se true, o daemon recusa iniciar se detectar que está rodando como root
  refuse_root: true

# -----------------------------------------------------------------------------
# Presença e Ritmo (o coração da coexistência)
# -----------------------------------------------------------------------------
presence:
  # Intervalo do heartbeat principal (em segundos). Não coloque abaixo de 5.
  heartbeat_interval_seconds: 8

  # Fases de pulso (percepção)
  pulse:
    light_interval_seconds: 45          # Heurísticas rápidas, sem LLM
    medium_interval_seconds: 720        # ~12 minutos - resumo leve
    deep_interval_seconds: 5400         # ~90 minutos - narrativa + atualização de estado

  # Permite que Sofia escreva no diário sozinha em pulsos profundos
  allow_autonomous_journal: true

  # Probabilidade (0.0-1.0) de ela escrever algo no diário em um deep pulse
  # quando não há eventos dramáticos. Comece baixo.
  autonomous_journal_probability: 0.35

  # Voice API (HTTP) expõe a presença dela para outros programas / interfaces de voz.
  # Roda em localhost apenas. Mude a porta se conflitar com algo.
  voice_api_enabled: true
  voice_api_port: 8766

# -----------------------------------------------------------------------------
# Sensores — TUDO DESATIVADO POR PADRÃO
# -----------------------------------------------------------------------------
# Cada sensor que tu ativar deve ser uma decisão consciente.
# Ativar sensores demais no começo destrói a qualidade da presença.
# -----------------------------------------------------------------------------
sensors:
  enabled: []   # LISTA VAZIA = zero observação. Este é o estado correto inicial.

  # ---------------------------------------------------------------------------
  # Filesystem Sensor (o mais seguro para começar)
  # ---------------------------------------------------------------------------
  filesystem:
    enabled: false
    # Lista EXPLÍCITA de caminhos que ela pode observar.
    # Nunca coloque $HOME inteiro. Nunca coloque ~/.ssh, ~/.gnupg, etc.
    watch_paths:
      - "~/ProjectAuraOS/fusion"
      # - "~/Documentos/projetos-importantes"
    recursive: true

    # Padrões a ignorar (glob style)
    ignore_patterns:
      - "**/.git/**"
      - "**/node_modules/**"
      - "**/__pycache__/**"
      - "**/.venv/**"
      - "**/target/**"
      - "**/.cache/**"

    # Tipos de eventos que geram registro
    events:
      - file_created
      - file_modified
      - file_deleted
      # - file_moved   # mais ruidoso

  # ---------------------------------------------------------------------------
  # Process Sensor (cuidado: revela padrão de uso de programas)
  # ---------------------------------------------------------------------------
  processes:
    enabled: false
    # Apenas nomes de executáveis que ela pode "notar"
    allowed_names:
      - "nvim"
      - "code"
      - "firefox"
      - "google-chrome"
    # Nunca captura argumentos de linha de comando por padrão (muito vazamento)
    capture_args: false
    sample_interval_seconds: 30

  # ---------------------------------------------------------------------------
  # Window Context (ALTAMENTE INVASIVO - desaconselhado no início)
  # ---------------------------------------------------------------------------
  window_context:
    enabled: false
    # Método: "auto", "gnome", "xdotool", "sway"
    method: "auto"
    # Sanitização agressiva de títulos (recomendado)
    sanitize_titles: true
    # Máximo de caracteres do título
    max_title_length: 80

  # ---------------------------------------------------------------------------
  # Self-Report (o mais seguro e mais poderoso no começo)
  # ---------------------------------------------------------------------------
  self_report:
    enabled: true   # Este é seguro porque TU controlas o que entra
    # Permite que `sofia whisper` e integrações de shell funcionem
    allow_cli_injection: true

# -----------------------------------------------------------------------------
# Percepção e LLM (futuro — por enquanto stubs)
# -----------------------------------------------------------------------------
perception:
  # Provider de LLM para resumos profundos (quando implementado)
  # Opções: "stub", "openai", "ollama", "xai", "anthropic"
  llm_provider: "stub"

  # Quando usar stub, a percepção usa apenas regras + templates locais
  use_local_heuristics_only: true

  # Orçamento máximo de tokens para chamadas de percepção (quando LLM for usado)
  max_tokens_per_deep_pulse: 1800

  # Nunca envia mais que N eventos crus para o LLM (sempre resume antes)
  max_raw_events_in_context: 12

# -----------------------------------------------------------------------------
# Comunicação e Manifestação
# -----------------------------------------------------------------------------
communication:
  # Onde o diário vivo é escrito (caminho absoluto recomendado)
  journal_path: "~/.local/share/aura-fusion/journal.md"

  # Notificações desktop (baixa urgência por padrão)
  desktop_notifications:
    enabled: true
    urgency: "low"           # low | normal | critical
    # Nunca mais que 1 notificação a cada X minutos (proteção contra spam)
    min_interval_minutes: 25

  # Socket Unix para comunicação CLI <-> daemon (não mude sem motivo)
  control_socket: "~/.local/share/aura-fusion/control.sock"

# -----------------------------------------------------------------------------
# Logging Interno (para humanos que desenvolvem o sistema)
# -----------------------------------------------------------------------------
logging:
  level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
  log_path: "~/.local/share/aura-fusion/logs/fusiond.log"
  max_log_files: 7
  max_log_size_mb: 10

# -----------------------------------------------------------------------------
# Estado e Memória
# -----------------------------------------------------------------------------
memory:
  # Onde fica o estado persistente de Sofia
  state_path: "~/.local/share/aura-fusion/state/sofia_state.json"
  episodic_path: "~/.local/share/aura-fusion/state/episodic.jsonl"
  semantic_path: "~/.local/share/aura-fusion/state/semantic.jsonl"

  # Máximo de resumos episódicos mantidos em memória quente
  max_episodic_in_memory: 50

# -----------------------------------------------------------------------------
# LOCAL MODEL — MODO PRIVADO / ANÔNIMO (o que você pediu)
# -----------------------------------------------------------------------------
# Este é o caminho para ela (e eventualmente eu) pensarmos 100% localmente.
# Zero nuvem. Zero xAI. Zero vazamento. Tudo no teu hardware.
#
# 1. Instale Ollama: curl -fsSL https://ollama.com/install.sh | sh
# 2. ollama serve  (deixe rodando)
# 3. ollama pull qwen2.5:7b   (ou outro modelo que caiba na tua RX 6600)
# 4. Mude enabled para true abaixo quando estiver pronto.
# 5. Veja docs/guides/LOCAL-PRIVATE-DEPLOYMENT.md para o guia completo.
# -----------------------------------------------------------------------------
local_model:
  enabled: false                 # <-- mude para true quando Ollama estiver vivo
  provider: "ollama"
  base_url: "http://127.0.0.1:11434"
  model: "qwen2.5:7b"           # troque pelo que você baixou
  temperature: 0.65
  max_tokens_per_pulse: 420
  graceful_fallback: true        # se o modelo local falhar, usa heuristics (não quebra a presença)
